<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Marvel Rivals Team-Up Dashboard</title>
    <link class="rounded" rel="icon" type="image/jpeg" href="rivals_icon.jpg">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-[#111827] text-gray-100 min-h-screen font-sans p-6">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold mb-2">🎮 Marvel Rivals Team-Up Dashboard</h1>
                <p class="text-gray-400">Gestioná tus slots por rol. Podés arrastrar hasta 6 héroes en una sola categoría si querés.</p>
            </div>
            
            <div class="flex items-center bg-[#1f2937] px-4 py-3 rounded-lg border border-gray-700 shadow-md shrink-0">
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="toggleOcultarLlenos" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-orange-600"></div>
                    <span class="ms-3 text-sm font-medium text-gray-300 select-none">Ocultar sugerencias si el rol está lleno</span>
                </label>
            </div>
        </header>

        <div id="warningMaxSlots" class="hidden mb-6 bg-yellow-950/80 border border-yellow-500/50 text-yellow-200 px-4 py-3 rounded relative flex items-center justify-between shadow-lg animate-pulse" role="alert">
            <span id="warningTexto" class="text-sm font-medium"></span>
            <button onclick="document.getElementById('warningMaxSlots').classList.add('hidden')" class="text-yellow-400 hover:text-yellow-200 font-bold ml-4 text-xs">Entendido</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-6 bg-[#1f2937] p-6 rounded-lg shadow-xl border border-gray-700 flex flex-col justify-between">
                <div class="space-y-6">
                    
                    <div>
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-lg font-bold text-red-400 flex items-center">🔴 DUELISTS (DPS)</h3>
                            <div class="flex items-center bg-[#111827] border border-gray-700 rounded-md overflow-hidden">
                                <button onclick="modificarSlots('d', -1)" class="px-3 py-1 bg-gray-800 text-gray-300 hover:bg-gray-700 text-sm font-bold transition-colors border-r border-gray-700 cursor-pointer">−</button>
                                <button onclick="modificarSlots('d', 1)" class="px-3 py-1 bg-red-950/40 text-red-400 hover:bg-red-900/40 text-sm font-bold transition-colors cursor-pointer">+</button>
                            </div>
                        </div>
                        <div id="d-slots-container" class="grid grid-cols-2 gap-4"></div>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-lg font-bold text-blue-400 flex items-center">🔵 VANGUARDS (TANKS)</h3>
                            <div class="flex items-center bg-[#111827] border border-gray-700 rounded-md overflow-hidden">
                                <button onclick="modificarSlots('v', -1)" class="px-3 py-1 bg-gray-800 text-gray-300 hover:bg-gray-700 text-sm font-bold transition-colors border-r border-gray-700 cursor-pointer">−</button>
                                <button onclick="modificarSlots('v', 1)" class="px-3 py-1 bg-blue-950/40 text-blue-400 hover:bg-blue-900/40 text-sm font-bold transition-colors cursor-pointer">+</button>
                            </div>
                        </div>
                        <div id="v-slots-container" class="grid grid-cols-2 gap-4"></div>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-lg font-bold text-green-400 flex items-center">🟢 STRATEGISTS (HEALERS)</h3>
                            <div class="flex items-center bg-[#111827] border border-gray-700 rounded-md overflow-hidden">
                                <button onclick="modificarSlots('s', -1)" class="px-3 py-1 bg-gray-800 text-gray-300 hover:bg-gray-700 text-sm font-bold transition-colors border-r border-gray-700 cursor-pointer">−</button>
                                <button onclick="modificarSlots('s', 1)" class="px-3 py-1 bg-green-950/40 text-green-400 hover:bg-green-900/40 text-sm font-bold transition-colors cursor-pointer">+</button>
                            </div>
                        </div>
                        <div id="s-slots-container" class="grid grid-cols-2 gap-4"></div>
                    </div>
                </div>

                <button id="btnReset" onclick="resetearFormulario()" class="w-full bg-gray-700 hover:bg-gray-600 text-gray-200 font-bold py-2 px-4 rounded transition-colors shadow mt-6 cursor-pointer text-sm">
                    ♻️ Resetear Equipo
                </button>
            </div>

            <div id="salidaPanel" class="bg-[#1f2937] p-6 rounded-lg shadow-xl border border-gray-700 space-y-6 overflow-y-auto max-h-[650px]">
                <p class="text-gray-400 italic">Selecciona personajes para calcular las sinergias automáticamente.</p>
            </div>
        </div>
    </div>

<script>
    let dbRivals = [];
    let duelistBase = [];
    let vanguardBase = [];
    let strategistBase = [];

    const composicion = {
        d: ["", ""],
        v: ["", ""],
        s: ["", ""]
    };

    const toggleOcultarLlenos = document.getElementById('toggleOcultarLlenos');

    window.addEventListener('DOMContentLoaded', () => {
        Papa.parse("marvel_rivals_52.csv", {
            download: true,
            header: true,
            complete: function(results) {
                dbRivals = results.data
                    .filter(row => row.Personaje)
                    .map(row => {
                        if (row.Personaje === "Star-Lord") row.Personaje = "Star Lord";
                        if (row.Team_Up_1 === "Star-Lord") row.Team_Up_1 = "Star Lord";
                        if (row.Team_Up_2 === "Star-Lord") row.Team_Up_2 = "Star Lord";
                        return row;
                    });
                    
                inicializarListas();
                renderizarTodosLosSlots();
            },
            error: function(err) {
                document.getElementById('salidaPanel').innerHTML = `<p class="text-red-400">❌ Error al cargar 'marvel_rivals_52.csv'.</p>`;
            }
        });
    });

    function inicializarListas() {
        duelistBase = dbRivals.filter(r => r.Rol === 'Duelist').map(r => r.Personaje).sort();
        vanguardBase = dbRivals.filter(r => r.Rol === 'Vanguard').map(r => r.Personaje).sort();
        strategistBase = dbRivals.filter(r => r.Rol === 'Strategist').map(r => r.Personaje).sort();

        if (!vanguardBase.includes("Deadpool")) vanguardBase.push("Deadpool");
        if (!strategistBase.includes("Deadpool")) strategistBase.push("Deadpool");
        vanguardBase.sort();
        strategistBase.sort();
    }

    function renderizarTodosLosSlots() {
        ['d', 'v', 's'].forEach(rol => renderizarSlotsRol(rol));
        filtrarDuplicadosGlobales();
        evaluarAlertaDeComposicion();
        analizarComposicion();
    }

    function renderizarSlotsRol(rol) {
        const contenedor = document.getElementById(`${rol}-slots-container`);
        contenedor.innerHTML = "";

        const colorFocus = rol === 'd' ? 'focus:border-red-500' : rol === 'v' ? 'focus:border-blue-500' : 'focus:border-green-500';

        composicion[rol].forEach((valorActual, index) => {
            const slotId = `${rol}${index + 1}`;
            
            const divSlot = document.createElement('div');
            divSlot.className = "group";
            if (index >= 2 && composicion[rol].length % 2 !== 0 && index === composicion[rol].length - 1) {
                divSlot.className += " col-span-2";
            }

            divSlot.innerHTML = `
                <label class="block text-xs font-semibold text-gray-400 mb-1">Slot ${index + 1}</label>
                <div class="relative">
                    <select id="${slotId}" onchange="guardarCambioSlot('${rol}', ${index}, this.value)" class="slot-select w-full bg-[#374151] border border-gray-600 rounded p-2 pr-8 text-white focus:outline-none ${colorFocus} appearance-none">
                    </select>
                    <button onclick="eliminarSlotEspecifico('${rol}', ${index})" class="absolute inset-y-0 right-0 pr-3 flex items-center text-xs text-gray-400 group-hover:text-red-400 cursor-pointer transition-colors" title="Eliminar este slot">
                        <span class="group-hover:hidden">▼</span>
                        <span class="hidden group-hover:inline font-bold">✕</span>
                    </button>
                </div>
            `;
            contenedor.appendChild(divSlot);
        });
    }

    function guardarCambioSlot(rol, index, valor) {
        composicion[rol][index] = valor;
        filtrarDuplicadosGlobales();
        analizarComposicion();
    }

    function obtenerCantidadSlotsVisibles() {
        return composicion.d.length + composicion.v.length + composicion.s.length;
    }

    function evaluarAlertaDeComposicion() {
        const alerta = document.getElementById('warningMaxSlots');
        const texto = document.getElementById('warningTexto');
        const cantidad = obtenerCantidadSlotsVisibles();

        if (cantidad === 6) {
            alerta.classList.add('hidden');
        } else {
            alerta.classList.remove('hidden');
            if (cantidad < 6) {
                texto.innerHTML = `⚠️ <strong>Composición Incompleta:</strong> Tenés <strong>${cantidad}</strong> slots activos. Recordá que una escuadra estándar de Marvel Rivals usa exactamente <strong>6 héroes</strong>.`;
            } else {
                texto.innerHTML = `⚠️ <strong>Composición Excedida:</strong> Tenés <strong>${cantidad}</strong> slots activos. Superaste el límite tradicional de <strong>6 integrantes</strong>.`;
            }
        }
    }

    function eliminarSlotEspecifico(rol, index) {
        composicion[rol].splice(index, 1);
        renderizarTodosLosSlots();
    }

    function modificarSlots(rol, cambio) {
        if (cambio === 1) {
            if (composicion[rol].length >= 6) return;
            composicion[rol].push("");
        } else if (cambio === -1) {
            if (composicion[rol].length <= 0) return;
            composicion[rol].pop();
        }
        renderizarTodosLosSlots();
    }

    function resetearFormulario() {
        composicion.d = ["", ""];
        composicion.v = ["", ""];
        composicion.s = ["", ""];
        document.getElementById('warningMaxSlots').classList.add('hidden');
        renderizarTodosLosSlots();
    }

    function filtrarDuplicadosGlobales() {
        const ocupados = new Set();
        ['d', 'v', 's'].forEach(rol => {
            composicion[rol].forEach(val => {
                if (val && val !== "") ocupados.add(val);
            });
        });

        const mapeoBases = { d: duelistBase, v: vanguardBase, s: strategistBase };

        ['d', 'v', 's'].forEach(rol => {
            const baseRol = mapeoBases[rol];
            composicion[rol].forEach((valorPropio, index) => {
                const el = document.getElementById(`${rol}${index + 1}`);
                if (!el) return;

                const filtrados = baseRol.filter(p => !ocupados.has(p) || p === valorPropio);
                
                el.innerHTML = '<option value="">(Vacío)</option>';
                filtrados.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p;
                    opt.textContent = p;
                    if (p === valorPropio) opt.selected = true;
                    el.appendChild(opt);
                });
            });
        });
    }

    function obtenerSeleccionados() {
        return [...composicion.d, ...composicion.v, ...composicion.s].filter(v => v !== "");
    }

    function analizarComposicion() {
        const seleccionados = obtenerSeleccionados();
        const salida = document.getElementById('salidaPanel');

        if (seleccionados.length === 0) {
            salida.innerHTML = '<p class="text-gray-400 italic">Completa al menos un slot para ver el mapa completo de sinergias.</p>';
            return;
        }

        const teamUp1Map = {}, teamUp2Map = {}, rolesMap = {};
        dbRivals.forEach(r => {
            teamUp1Map[r.Personaje] = r.Team_Up_1;
            teamUp2Map[r.Personaje] = r.Team_Up_2;
            rolesMap[r.Personaje] = r.Rol;
        });

        // Corrección de normalización de nombres para el mapeo dinámico
        const slotsOcupadosPorRol = {
            Duelist: composicion.d.filter(v => v !== "").length,
            Vanguard: composicion.v.filter(v => v !== "").length,
            Strategist: composicion.s.filter(v => v !== "").length
        };

        const limitesPorRol = {
            Duelist: composicion.d.length,
            Vanguard: composicion.v.length,
            Strategist: composicion.s.length
        };

        const activos = { Duelist: [], Vanguard: [], Strategist: [] };
        
        ['d', 'v', 's'].forEach(rolKey => {
            const rolNombre = rolKey === 'd' ? 'Duelist' : rolKey === 'v' ? 'Vanguard' : 'Strategist';
            composicion[rolKey].forEach(p => {
                if (!p) return;
                const t1 = teamUp1Map[p];
                const t2 = teamUp2Map[p];
                if ((t1 && seleccionados.includes(t1)) || (t2 && seleccionados.includes(t2))) {
                    const aliados = [t1, t2].filter(a => seleccionados.includes(a));
                    activos[rolNombre].push(`<li class="ml-4 list-disc"><strong>${p}</strong> ➔ Activo por <strong>${aliados.join(' & ')}</strong></li>`);
                }
            });
        });

        let totalActivos = activos.Duelist.length + activos.Vanguard.length + activos.Strategist.length;
        let html = `<h2 class="text-xl font-bold text-orange-400 border-b border-gray-700 pb-2">🔥 Sinergias Activas en el Equipo</h2>`;
        
        if (totalActivos === 0) {
            html += `<p class="text-gray-500 italic text-sm mt-3">No hay sinergias activas en el equipo actual.</p>`;
        } else {
            ['Duelist', 'Vanguard', 'Strategist'].forEach(rol => {
                if (activos[rol].length > 0) {
                    html += `<h4 class="text-sm font-semibold mt-3 text-gray-300">⚔️ Sección ${rol}</h4>`;
                    html += `<ul class="space-y-1 mt-1 text-sm">${activos[rol].join('')}</ul>`;
                }
            });
        }

        html += `<div class="my-6 border-t border-gray-700"></div>`;
        html += `<h2 class="text-xl font-bold text-green-400 border-b border-gray-700 pb-2">💡 Opciones Disponibles para Slots Vacíos</h2>`;
        
        const recRecibe = { Duelist: [], Vanguard: [], Strategist: [] };
        const recOtorga = { Duelist: [], Vanguard: [], Strategist: [] };
        const vistasRecibe = { Duelist: new Set(), Vanguard: new Set(), Strategist: new Set() };
        const vistasOtorga = { Duelist: new Set(), Vanguard: new Set(), Strategist: new Set() };

        function obtenerRolPersonaje(nombre, rolEvaluado) {
            if (nombre === "Deadpool") return rolEvaluado; 
            return rolesMap[nombre] || "Duelist";
        }

        ['Duelist', 'Vanguard', 'Strategist'].forEach(rolActual => {
            if (limitesPorRol[rolActual] === 0) return; 
            if (toggleOcultarLlenos.checked && slotsOcupadosPorRol[rolActual] >= limitesPorRol[rolActual]) return;

            seleccionados.forEach(p => {
                [teamUp1Map[p], teamUp2Map[p]].forEach(comp => {
                    if (comp && !seleccionados.includes(comp)) {
                        const rComp = obtenerRolPersonaje(comp, rolActual);
                        if (rComp === rolActual) {
                            const clave = `${comp}|${p}`;
                            if (!vistasRecibe[rolActual].has(clave)) {
                                vistasRecibe[rolActual].add(clave);
                                recRecibe[rolActual].push({ comp, dueño: p });
                            }
                        }
                    }
                });

                dbRivals.forEach(r => {
                    const candidato = r.Personaje;
                    if ((r.Team_Up_1 === p || r.Team_Up_2 === p) && !seleccionados.includes(candidato)) {
                        const rCazador = obtenerRolPersonaje(candidato, rolActual);
                        if (rCazador === rolActual) {
                            const clave = `${candidato}|${p}`;
                            if (!vistasOtorga[rolActual].has(clave)) {
                                vistasOtorga[rolActual].add(clave);
                                recOtorga[rolActual].push({ "cazador": candidato, dueño: p });
                            }
                        }
                    }
                });
            });
        });

        let totalRecomendacionesGlobales = 0;

        ['Duelist', 'Vanguard', 'Strategist'].forEach(rol => {
            if (limitesPorRol[rol] === 0) return;
            if (toggleOcultarLlenos.checked && slotsOcupadosPorRol[rol] >= limitesPorRol[rol]) return; 

            let lineasHtmlRol = [];

            recRecibe[rol].sort((a, b) => a.comp.localeCompare(b.comp)).forEach(obj => {
                lineasHtmlRol.push(`<li class="ml-4 list-disc text-sm">Agregar a <strong>${obj.comp}</strong> ➔ <span class="text-gray-300">(${obj.dueño} consigue team up)</span></li>`);
            });

            recOtorga[rol].sort((a, b) => a.cazador.localeCompare(b.cazador)).forEach(obj => {
                lineasHtmlRol.push(`<li class="ml-4 list-disc text-sm">Agregar a <strong>${obj.cazador}</strong> ➔ <span class="text-gray-400">(Obtiene team up gracias a ${obj.dueño})</span></li>`);
            });

            if (lineasHtmlRol.length > 0) {
                html += `<h3 class="text-md font-bold mt-4 text-gray-200 uppercase tracking-wider">➕ Candidatos para el Rol: ${rol} (${slotsOcupadosPorRol[rol]}/${limitesPorRol[rol]})</h3>`;
                html += `<ul class="space-y-1 mt-1">${lineasHtmlRol.join('')}</ul>`;
                totalRecomendacionesGlobales += lineasHtmlRol.length;
            }
        });

        if (totalRecomendacionesGlobales === 0) {
            html += `<p class="text-gray-500 italic text-sm mt-3">No hay combinaciones o candidatos detectados para los slots libres.</p>`;
        }

        salida.innerHTML = html;
    }

    toggleOcultarLlenos.addEventListener('change', analizarComposicion);
</script>
</body>
</html>
